<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>520 Vilões Marvel & DC • Ranking Mobile</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card-bg: #12121f;
            --border: #222235;
            --text: #d0d0d8;
            --text-dim: #8888a0;
            --marvel: #e62429;
            --dc: #0476f2;
            --gold: #f0c040;
            --shadow: 0 4px 20px rgba(0,0,0,0.6);
            --radius: 12px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(ellipse at 30% 20%, #1a0e1f 0%, transparent 60%),
                              radial-gradient(ellipse at 70% 80%, #0a1025 0%, transparent 60%);
            color: var(--text);
            min-height: 100vh;
            padding: 1.5rem 0.8rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.4;
            -webkit-text-size-adjust: 100%;
        }
        .container { width: 100%; max-width: 1400px; }
        .header { text-align: center; margin-bottom: 1.5rem; }
        .header .sub { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.3em; color: var(--text-dim); }
        .header h1 {
            font-size: clamp(1.6rem, 6vw, 2.8rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--marvel), #c0392b 30%, #ff4d4d 45%, var(--dc) 55%, #1a5bbf 75%);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(200,40,80,0.5));
            margin: 0.2rem 0;
        }
        .header p { color: var(--text-dim); font-size:0.9rem; }
        .header span.m { color: #ff6b6b; font-weight:700; }
        .header span.dc { color: #6bb5ff; font-weight:700; }

        .toolbar {
            display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: center;
            margin-bottom: 1.2rem; padding: 0.7rem 0.9rem; background: var(--card-bg);
            border-radius: var(--radius); border: 1px solid var(--border); justify-content: space-between;
        }
        .search-box { display: flex; gap: 0.4rem; align-items: center; flex:1; min-width:180px; }
        .search-box input {
            flex:1; padding:0.5rem 0.8rem; border-radius:20px; border:1px solid var(--border);
            background:#1a1a28; color:#ddd; font-size:0.85rem; outline:none;
        }
        .filter-btns { display:flex; gap:0.3rem; flex-wrap:wrap; }
        .filter-btn {
            padding:0.35rem 0.8rem; border-radius:20px; border:1px solid var(--border); background:transparent;
            color:#aaa; cursor:pointer; font-weight:600; font-size:0.75rem; transition:0.2s; white-space:nowrap;
        }
        .filter-btn.active { border-color:#fff; color:#fff; background:#1e1e2a; }
        .filter-btn.marvel-active { border-color:var(--marvel); color:#ff6b6b; background:rgba(230,36,41,0.15); }
        .filter-btn.dc-active { border-color:var(--dc); color:#6bb5ff; background:rgba(4,118,242,0.15); }
        .rubric-btn {
            padding:0.35rem 0.8rem; border-radius:20px; border:1px solid var(--gold);
            background:rgba(240,192,64,0.1); color:var(--gold); cursor:pointer; font-weight:700;
            font-size:0.75rem; transition:0.2s; white-space:nowrap;
        }
        .rubric-btn:hover { background:rgba(240,192,64,0.25); }

        .count-info { text-align: right; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 0.6rem; }
        .villain-list { display: flex; flex-direction: column; gap: 0.7rem; max-height: 70vh; overflow-y: auto; padding-right:0.4rem; }
        .villain-list::-webkit-scrollbar { width:4px; }
        .villain-list::-webkit-scrollbar-thumb { background:#3a3a4a; border-radius:2px; }

        .villain-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 0.7rem 0.9rem; display: flex; flex-wrap: wrap; align-items: flex-start; gap: 0.6rem;
            transition: 0.2s; box-shadow: var(--shadow); font-size:0.82rem;
        }
        .villain-card.marvel { border-left: 4px solid var(--marvel); }
        .villain-card.dc { border-left: 4px solid var(--dc); }

        .card-left { display: flex; align-items: center; gap: 0.5rem; min-width: 200px; flex-shrink: 0; }
        .card-rank { font-weight: 900; font-size: 1.3rem; color: #444; width: 30px; text-align: center; }
        .villain-card:nth-child(-n+3) .card-rank { color: var(--gold); }
        .villain-emoji { font-size: 1.8rem; width: 36px; text-align: center; }
        .villain-info { display: flex; flex-direction: column; }
        .villain-name { font-weight: 700; font-size: 0.9rem; white-space: nowrap; }
        .villain-universe {
            font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700;
            padding: 0.1rem 0.4rem; border-radius: 10px; width: fit-content; margin-top: 0.1rem;
        }
        .villain-universe.marvel { background:rgba(230,36,41,0.15); color:#ff6b6b; border:1px solid rgba(230,36,41,0.4); }
        .villain-universe.dc { background:rgba(4,118,242,0.15); color:#6bb5ff; border:1px solid rgba(4,118,242,0.4); }

        .total-points-badge {
            background: rgba(240,192,64,0.15); color: var(--gold); font-weight: 900;
            font-size: 0.9rem; padding: 0.15rem 0.5rem; border-radius: 14px; margin-left: auto; white-space: nowrap;
        }
        .crimes-list { flex:1; display: flex; flex-wrap: wrap; gap: 0.25rem; align-items: flex-start; min-width: 200px; }
        .crime-chip {
            background: #1a1a2a; border: 1px solid #2a2a3a; border-radius: 5px; padding: 0.15rem 0.4rem;
            font-size: 0.68rem; display: inline-flex; align-items: center; gap: 0.2rem; white-space: nowrap;
        }
        .crime-chip .crime-pts { font-weight:700; color:var(--gold); background:#111; padding:0.05rem 0.25rem; border-radius:3px; }
        .crime-chip .crime-rubric { color:#8888cc; font-size:0.6rem; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.85); z-index:1000; justify-content: center; align-items: center;
        }
        .modal-overlay.active { display:flex; }
        .modal-content {
            background: #12121f; border: 1px solid #2a2a3a; border-radius: var(--radius); padding: 1.5rem;
            max-width: 95vw; width: 500px; max-height: 80vh; overflow-y: auto; color: var(--text);
            box-shadow: 0 20px 40px rgba(0,0,0,0.9); font-size:0.8rem;
        }
        .close-modal { float:right; background:none; border:none; color:#aaa; font-size:1.5rem; cursor:pointer; }
        .rubric-table { width:100%; border-collapse:collapse; }
        .rubric-table th { text-align:left; padding:0.3rem; border-bottom:1px solid #2a2a3a; color:var(--text-dim); font-size:0.7rem; }
        .rubric-table td { padding:0.2rem 0.3rem; border-bottom:1px solid #1e1e2a; font-size:0.75rem; }
        .rubric-table .pts { font-weight:700; color:var(--gold); text-align:center; }

        @media (max-width: 500px) {
            .villain-card { padding:0.5rem 0.6rem; }
            .card-left { min-width:160px; }
            .villain-name { font-size:0.8rem; }
            .crimes-list { gap:0.15rem; }
            .crime-chip { font-size:0.62rem; padding:0.1rem 0.3rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="sub">Pixel Parade • Análise de Atrocidades</div>
            <h1>RANKING DE MALIGNIDADE: 520 VILÕES</h1>
            <p><span class="m">Marvel</span> ⚡ vs <span class="dc">DC</span> — Otimizado para celular</p>
        </header>

        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar vilão..." autocomplete="off">
            </div>
            <div class="filter-btns">

                <button class="filter-btn" data-universe="marvel">Marvel</button>
                <button class="filter-btn" data-universe="dc">DC</button>
            </div>
            <button class="rubric-btn" id="openRubricBtn">📋 Rubrica</button>
        </div>

        <div class="count-info" id="countDisplay"></div>
        <div class="villain-list" id="villainList"></div>
    </div>

    <div class="modal-overlay" id="rubricModal">

            <h2 style="color:var(--gold); margin-bottom:0.8rem;">Villain Scoring Rubric</h2>
            <table class="rubric-table" id="rubricTable"></table>

                { name: "Assault", points: 10 }, { name: "Hate Crimes", points: 10 }, { name: "Racism", points: 10 },
                { name: "Arson", points: 8 }, { name: "Mass Arson", points: 10 }, { name: "Theft", points: 7 },
                { name: "Grand Theft Animarum", points: 12 }, { name: "Attempted Grand Theft Animarum", points: 10 }, { name: "Grand Theft", points: 9 },

                const crimes = [];

                    case 'psycho': add("Murder", "Assassinatos em série."); add("Torture", "Torturou vítimas."); add("Psychological Torture", "Terror psicológico."); add("Child Murder", "Matou crianças."); add("Terrorism", "Atos terroristas."); break;

                    case 'tech': add("Attempted Genocide/Mass Murder", "Exterminar humanidade."); add("Mass Property/Environmental Damage", "Destruição."); add("Terrorism", "Ataques cibernéticos."); add("Murder", "Assassinatos."); add("Grand Theft", "Roubo de tecnologia."); break;
                    case 'alien': add("Mass Murder", "Massacres."); add("Mass Property/Environmental Damage", "Danos."); add("Kidnapping", "Abduções."); add("Terrorism", "Ataques."); add("Attempted Mass Domination", "Invasão."); break;
                    default: add("Murder", "Assassinato."); add("Assault", "Agressão."); add("Theft", "Roubo."); add("Arson", "Incêndio."); add("Kidnapping", "Sequestro.");
                }
                return crimes;
            }

            const mainVillains = [

                for (let i = 0; i < 5; i++) {
                    const variantName = i === 0 ? base.name : base.name + variants[i];
                    const crimes = generateCrimes(base.profile);
                    if (i > 0 && crimes.length > 0) crimes[0].points += Math.floor(Math.random() * 3);
                    allVillains.push({ name: variantName, universe: base.universe, emoji: base.emoji, crimes });
                }
            });

                let filtered = allVillains.filter(v => {
                    if (currentUniverse !== 'all' && v.universe !== currentUniverse) return false;
                    if (searchTerm && !v.name.toLowerCase().includes(searchTerm.toLowerCase())) return false;
                    return true;
                });
                countDisplay.textContent = `${filtered.length} de ${allVillains.length} vilões`;

                    const card = document.createElement('div');
                    card.className = `villain-card ${v.universe}`;
