<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <style>
        :root {

                              radial-gradient(ellipse at 70% 80%, #0a1025 0%, transparent 60%);
            color: var(--text); min-height: 100vh; padding: 1.5rem 0.8rem 2rem; display: flex; flex-direction: column; align-items: center; line-height: 1.4;

        .container { width: 100%; max-width: 1400px; }

        .header .sub { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.3em; color: var(--text-dim); }

            font-size: clamp(1.6rem, 6vw, 2.8rem); font-weight: 900;
            background: linear-gradient(135deg, var(--marvel), #c0392b 30%, #ff4d4d 45%, var(--dc) 55%, #1a5bbf 75%);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(200,40,80,0.5)); margin: 0.2rem 0;
        }
        .header p { color: var(--text-dim); font-size:0.9rem; }
        .toolbar {
            display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: center; margin-bottom: 1.2rem;
            padding: 0.7rem 0.9rem; background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); justify-content: space-between;
        }
        .search-box { display: flex; gap: 0.4rem; align-items: center; flex:1; min-width:180px; }
        .search-box input { flex:1; padding:0.5rem 0.8rem; border-radius:20px; border:1px solid var(--border); background:#1a1a28; color:#ddd; font-size:0.85rem; outline:none; }
        .filter-btns { display:flex; gap:0.3rem; flex-wrap:wrap; }
        .filter-btn { padding:0.35rem 0.8rem; border-radius:20px; border:1px solid var(--border); background:transparent; color:#aaa; cursor:pointer; font-weight:600; font-size:0.75rem; transition:0.2s; white-space:nowrap; }
        .filter-btn.active { border-color:#fff; color:#fff; background:#1e1e2a; }
        .filter-btn.marvel-active { border-color:var(--marvel); color:#ff6b6b; background:rgba(230,36,41,0.15); }
        .filter-btn.dc-active { border-color:var(--dc); color:#6bb5ff; background:rgba(4,118,242,0.15); }
        .rubric-btn { padding:0.35rem 0.8rem; border-radius:20px; border:1px solid var(--gold); background:rgba(240,192,64,0.1); color:var(--gold); cursor:pointer; font-weight:700; font-size:0.75rem; }
        .count-info { text-align: right; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 0.6rem; }
        .villain-list { display: flex; flex-direction: column; gap: 0.7rem; max-height: 70vh; overflow-y: auto; padding-right:0.4rem; }
        .villain-list::-webkit-scrollbar { width:4px; }
        .villain-list::-webkit-scrollbar-thumb { background:#3a3a4a; border-radius:2px; }

        .villain-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 0.7rem 0.9rem; display: flex; flex-wrap: wrap; align-items: flex-start; gap: 0.6rem;
            transition: 0.2s; box-shadow: var(--shadow); font-size:0.82rem;

        .villain-card.marvel { border-left: 4px solid var(--marvel); }
        .villain-card.dc { border-left: 4px solid var(--dc); }
        .card-left { display: flex; align-items: center; gap: 0.5rem; min-width: 200px; flex-shrink: 0; }
        .card-rank { font-weight: 900; font-size: 1.3rem; color: #444; width: 30px; text-align: center; }
        .villain-card:nth-child(-n+3) .card-rank { color: var(--gold); }
        .villain-emoji { font-size: 1.8rem; width: 36px; text-align: center; }
        .villain-info { display: flex; flex-direction: column; }
        .villain-name { font-weight: 700; font-size: 0.9rem; white-space: nowrap; }
        .villain-universe { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; padding: 0.1rem 0.4rem; border-radius: 10px; width: fit-content; margin-top: 0.1rem; }
        .villain-universe.marvel { background:rgba(230,36,41,0.15); color:#ff6b6b; border:1px solid rgba(230,36,41,0.4); }

        .total-points-badge { background: rgba(240,192,64,0.15); color: var(--gold); font-weight: 900; font-size: 0.9rem; padding: 0.15rem 0.5rem; border-radius: 14px; margin-left: auto; white-space: nowrap; }
        .crimes-list { flex:1; display: flex; flex-wrap: wrap; gap: 0.25rem; align-items: flex-start; min-width: 200px; }
        .crime-chip { background: #1a1a2a; border: 1px solid #2a2a3a; border-radius: 5px; padding: 0.15rem 0.4rem; font-size: 0.68rem; display: inline-flex; align-items: center; gap: 0.2rem; white-space: nowrap; }
        .crime-chip .crime-pts { font-weight:700; color:var(--gold); background:#111; padding:0.05rem 0.25rem; border-radius:3px; }
        .crime-rubric { color:#8888cc; font-size:0.6rem; }

        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; justify-content:center; align-items:center; }
        .modal-overlay.active { display:flex; }
        .modal-content { background:#12121f; border:1px solid #2a2a3a; border-radius:var(--radius); padding:1.5rem; max-width:95vw; width:500px; max-height:80vh; overflow-y:auto; color:var(--text); box-shadow:0 20px 40px rgba(0,0,0,0.9); font-size:0.8rem; }
        .close-modal { float:right; background:none; border:none; color:#aaa; font-size:1.5rem; cursor:pointer; }
        .rubric-table { width:100%; border-collapse:collapse; }
        .rubric-table th { text-align:left; padding:0.3rem; border-bottom:1px solid #2a2a3a; color:var(--text-dim); font-size:0.7rem; }
        .rubric-table td { padding:0.2rem 0.3rem; border-bottom:1px solid #1e1e2a; font-size:0.75rem; }
        .rubric-table .pts { font-weight:700; color:var(--gold); text-align:center; }

        @media (max-width: 500px) {
            .villain-card { padding:0.5rem 0.6rem; }
            .card-left { min-width:160px; }
            .villain-name { font-size:0.8rem; }
            .crimes-list { gap:0.15rem; }
            .crime-chip { font-size:0.62rem; padding:0.1rem 0.3rem; }
        }
    </style>
</head>

                    crimes: generateCrimes(gen.profile)
                });
            });

            while (allVillains.length < 500) {
                const randomGen = generatedNames[Math.floor(Math.random() * generatedNames.length)];
                allVillains.push({
                    name: randomGen.name + " (reincidência)",
                    universe: randomGen.universe,
                    emoji: randomGen.emoji,
                    crimes: generateCrimes(randomGen.profile)
                });
            }
            allVillains.length = 500; // corta para exatos 500

            // Calcular pontuações e ordenar
            allVillains.forEach(v => v.totalPoints = v.crimes.reduce((sum, c) => sum + c.points, 0));
            allVillains.sort((a, b) => b.totalPoints - a.totalPoints);

            // ============ RENDERIZAÇÃO ============
            let currentUniverse = 'all', searchTerm = '';
            const listContainer = document.getElementById('villainList');
            const countDisplay = document.getElementById('countDisplay');

            function render() {
                let filtered = allVillains.filter(v => {
                    if (currentUniverse !== 'all' && v.universe !== currentUniverse) return false;
                    if (searchTerm && !v.name.toLowerCase().includes(searchTerm.toLowerCase())) return false;
                    return true;
                });
                countDisplay.textContent = `${filtered.length} de ${allVillains.length} entidades`;
                listContainer.innerHTML = '';
                filtered.forEach((v, idx) => {
                    const card = document.createElement('div');
                    card.className = `villain-card ${v.universe}`;
                    const crimesHtml = v.crimes.map(c => `
                        <span class="crime-chip">
                            <span class="crime-pts">+${c.points}</span>
                            <span>${c.desc}</span>
                            <span class="crime-rubric">(${c.rubric})</span>
                        </span>
                    `).join('');
                    card.innerHTML = `
                        <div class="card-left">
                            <span class="card-rank">#${idx+1}</span>
                            <span class="villain-emoji">${v.emoji}</span>
                            <div class="villain-info">
                                <span class="villain-name">${v.name}</span>
                                <span class="villain-universe ${v.universe}">${v.universe==='marvel'?'Marvel':'DC'}</span>
                            </div>
                            <span class="total-points-badge">${v.totalPoints} pts</span>
                        </div>
                        <div class="crimes-list">${crimesHtml}</div>
                    `;
                    listContainer.appendChild(card);
                });
            }

                });
            });
